# Run from this directory (gregWiki repo root):  docker compose up --build
# Wrong context (e.g. monorepo parent) causes: ENOENT /app/package.json
services:
  wiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      CHOKIDAR_USEPOLLING: 'true'
